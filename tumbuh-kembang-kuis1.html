<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Studi Kasus Penyuluhan Kesehatan Reproduksi</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#1f4e79;
}

.navgrid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
margin-bottom:25px;
}

.qbtn{
padding:10px;
border:none;
border-radius:6px;
background:#ddd;
cursor:pointer;
font-weight:bold;
}

.qbtn.active{
background:#1f4e79;
color:white;
}

.qbtn.answered{
background:#2ecc71;
color:white;
}

.option{
display:block;
padding:10px;
border:1px solid #ddd;
margin:8px 0;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.option:hover{
background:#eef3ff;
}

/* efek jawaban */

.option.correct{
background:#d4edda;
border-color:#28a745;
}

.option.wrong{
background:#f8d7da;
border-color:#dc3545;
}

.answer{
margin-top:15px;
background:#eef4ff;
padding:15px;
border-radius:8px;
}

.correcttext{
color:#2e7d32;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Studi Kasus Penyuluhan Kesehatan Reproduksi</h1>

<div class="navgrid" id="nav"></div>

<div id="quiz"></div>

</div>

{

o:[

{

o:[

let answers=new Array(questions.length).fill(null)
let current=null

function createNav(){

let html=""

questions.forEach((q,i)=>{
html+=`<button class="qbtn" id="nav${i}" onclick="loadQuestion(${i})">${i+1}</button>`
})

document.getElementById("nav").innerHTML=html

}

function loadQuestion(i){

current=i

let q=questions[i]

let html=`<h3>${i+1}. ${q.q}</h3>`

q.o.forEach((opt,index)=>{

let disabled = answers[i]!==null ? "disabled" : ""

html+=`
<label class="option" id="opt${index}">
<input type="radio" name="opt" ${disabled}
onclick="answer(${index})">
${opt}
</label>
`

})

html+=`<div id="explain"></div>`

document.getElementById("quiz").innerHTML=html

updateNav()

if(answers[i]!=null) showExplain()

}

function answer(val){

answers[current]=val

let q=questions[current]

/* tandai jawaban */

q.o.forEach((opt,i)=>{

let el=document.getElementById("opt"+i)

if(i===q.a){
el.classList.add("correct")
}

if(i===val && val!==q.a){
el.classList.add("wrong")
}

})

/* kunci semua opsi */

document.querySelectorAll("input[name='opt']").forEach(el=>{
el.disabled=true
})

showExplain()

updateNav()

}

function showExplain(){

let q=questions[current]

document.getElementById("explain").innerHTML=

`<div class="answer">
<div class="correcttext">Jawaban benar: ${q.o[q.a]}</div>
<br>
<b>Pembahasan:</b><br>
${q.e}
</div>`

}

function updateNav(){

questions.forEach((q,i)=>{

let btn=document.getElementById("nav"+i)

btn.classList.remove("active")
btn.classList.remove("answered")

if(i===current) btn.classList.add("active")

if(answers[i]!=null) btn.classList.add("answered")

})

}

createNav()

</script>

</body>
</html>
