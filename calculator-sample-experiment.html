<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eksperimen: Sample Size & Sampling</title>

<style>
body{font-family:Arial;text-align:center;background:#fff;padding:20px;}
h1{color:#2c3e50;}

button{
    padding:10px 15px;
    margin:10px;
    border:none;
    border-radius:5px;
    background:#3498db;
    color:white;
    cursor:pointer;
}
button:hover{background:#2980b9;}

input{padding:6px;width:100px;margin:5px;text-align:center;}

.card{
    background:#f4f6f7;
    padding:20px;
    margin:15px auto;
    border-radius:10px;
    max-width:800px;
    text-align:left;
}

.hidden{display:none;}

.population{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(40px,1fr));
    gap:5px;
    max-width:600px;
    margin:20px auto;
}

.person{
    padding:8px;
    background:#ddd;
    border-radius:5px;
}

.treatment{background:#2ecc71;color:white;}
.control{background:#e74c3c;color:white;}

.footer{
    margin-top:40px;
    font-size:13px;
}
</style>
</head>

<body>

<h1>🧪 Eksperimen: Sample Size & Sampling</h1>

<div>
    <button onclick="showStep(1)">Langkah 1: Hitung Sampel</button>
    <button onclick="showStep(2)">Langkah 2: Simulasi Sampling</button>
</div>

<!-- STEP 1 -->
<div id="step1">

<div class="card">
<b>Input Parameter:</b><br><br>
Effect Size (Δ): <input id="effect" value="5"><br>
Standar Deviasi (σ): <input id="sd" value="10"><br>
Alpha (0.05): tetap<br>
Power (0.8): tetap<br><br>

<button onclick="calculate()">Hitung</button>
</div>

<div class="card" id="formulaBox"></div>
<div class="card" id="detail"></div>
<div class="card" id="result"></div>

</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">

<div class="card">
Populasi: <input id="pop" value="30">
<button onclick="generatePop()">Generate</button>
</div>

<div>
<button onclick="runRCT()">Simulasi RCT</button>
<button onclick="runQuasi()">Simulasi Quasi</button>
</div>

<div class="population" id="popBox"></div>

<div class="card" id="compare"></div>

</div>

<div class="footer">
© 2026 Ngakan Putu Anom Harjana<br>
anomharjana@unud.ac.id
</div>

<script>

// STEP SWITCH
function showStep(step){
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step"+step).classList.remove("hidden");
}

// STEP 1 CALCULATION
function calculate(){

    let e=parseFloat(document.getElementById("effect").value);
    let sd=parseFloat(document.getElementById("sd").value);

    let zA=1.96;
    let zB=0.84;

    let sd2 = Math.pow(sd,2);
    let zSum = zA + zB;
    let z2 = Math.pow(zSum,2);

    let numerator = 2 * sd2 * z2;
    let denominator = Math.pow(e,2);

    let n = Math.ceil(numerator / denominator);

    // FORMULA
    document.getElementById("formulaBox").innerHTML = `
    <b>📐 Rumus Besar Sampel (Eksperimen 2 Kelompok):</b><br><br>
    n = 2 × σ² × (Zα/2 + Zβ)² / Δ²<br><br>

    Keterangan:<br>
    σ = standar deviasi<br>
    Δ = effect size<br>
    Zα/2 = 1.96<br>
    Zβ = 0.84
    `;

    // DETAIL STEP
    document.getElementById("detail").innerHTML = `
    <b>🧮 Proses Perhitungan:</b><br><br>

    1️⃣ Substitusi nilai:<br>
    n = 2 × (${sd})² × (${zA} + ${zB})² / (${e})²<br><br>

    2️⃣ Hitung komponen:<br>
    (${sd})² = ${sd2}<br>
    (${zA} + ${zB}) = ${zSum}<br>
    (${zSum})² = ${z2.toFixed(2)}<br><br>

    3️⃣ Hitung pembilang:<br>
    2 × ${sd2} × ${z2.toFixed(2)} = ${numerator.toFixed(2)}<br><br>

    4️⃣ Hitung penyebut:<br>
    (${e})² = ${denominator}<br><br>

    5️⃣ Hasil akhir:<br>
    n = ${numerator.toFixed(2)} / ${denominator} = <b>${n}</b>
    `;

    // RESULT
    document.getElementById("result").innerHTML = `
    <b>📊 Hasil:</b><br><br>
    Sampel minimal per kelompok = <b>${n}</b><br>
    Total sampel = <b>${n*2}</b>
    `;
}

// STEP 2
let population=[];

function generatePop(){
    let N=parseInt(document.getElementById("pop").value);
    let box=document.getElementById("popBox");
    box.innerHTML="";
    population=[];

    for(let i=1;i<=N;i++){
        population.push(i);
        let d=document.createElement("div");
        d.className="person";
        d.id="p"+i;
        d.innerText=i;
        box.appendChild(d);
    }
}

function runRCT(){
    reset();

    let shuffled=[...population].sort(()=>Math.random()-0.5);

    shuffled.forEach((id,i)=>{
        let el=document.getElementById("p"+id);
        setTimeout(()=>{
            if(i%2==0) el.classList.add("treatment");
            else el.classList.add("control");
        },i*40);
    });

    document.getElementById("compare").innerHTML=`
    <b>RCT:</b> Kelompok seimbang → validitas tinggi
    `;
}

function runQuasi(){
    reset();

    population.forEach((id,i)=>{
        let el=document.getElementById("p"+id);

        setTimeout(()=>{
            if(i<population.length*0.7){
                el.classList.add("treatment");
            } else {
                el.classList.add("control");
            }
        },i*40);
    });

    document.getElementById("compare").innerHTML=`
    <b>Quasi:</b> Kelompok tidak seimbang → ada bias
    `;
}

function reset(){
    population.forEach(id=>{
        document.getElementById("p"+id).className="person";
    });
}

</script>

</body>
</html>
